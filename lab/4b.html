<!DOCTYPE html>
<html>
    <head>
        <title>Largest Number</title>
    </head>
    <body>
        <script>
            let a = Number(window.prompt("Enter the first number:"));
            +
            let b = Number(window.prompt("Enter the second number:"));
            let c = Number(window.prompt("Enter the third number:"));
            if(a>b && a>c){
                document.write(a + " is the largest number.");
                alert(a + " is the largest number.");
            }
            else if(b>a && b>c){
                document.write(b + " is the largest number.");
                alert(b + " is the largest number.");
            }
            else if(c>a && c>b){
                document.write(c + " is the largest number.");
                alert(c + " is the largest number.");
            }
            else{
                document.write("All numbers are equal.");
                alert("All numbers are equal.");
            }
            document.write("<br><br>Numbers from 1 to 10 using for loop:");
            for(let i=1; i<=10; i++){
                document.write("<br>" + i);
            }
            document.write("<br><br>prime Numbers from 1 to 10 using while loop:");
            let i = 1;
            while(i<=10){
                let isPrime = true;
                if(i<=1){
                    isPrime = false;
                }
                for(let j=2; j<=Math.sqrt(i); j++){
                    if(i%j==0){
                        isPrime = false;
                        break;
                    }
                }
                if(isPrime){
                    document.write("<br>" + i);
                }
                i++;
            }
            document.write("<br><br>even Numbers from 1 to 10 using do-while loop:");
            i = 1;
            do{
                if(i%2==0){
                    document.write("<br>" + i);
                }
                i++;
            }while(i<=10);

        </script>
    </body>
</html>
