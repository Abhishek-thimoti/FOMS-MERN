<!DOCTYPE html>
<html>
<head>
<style>
    .name { color: red; }
    .hex { color: #00ff00; }
    .rgb { color: rgb(0, 0, 255); }
    .rgba { color: rgba(0, 0, 0, 0.5); }
    .hsl { color: hsl(120, 100%, 50%); }
</style>
</head>
<body>
    <p class="name">Named Color</p>
    <p class="hex">Hex Color</p>
    <p class="rgb">RGB Color</p>
    <p class="rgba">RGBA Color</p>
    <p class="hsl">HSL Color</p>
</body>
</html>
