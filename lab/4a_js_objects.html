<!DOCTYPE html>
<html>
<body>
    <script>
        document.write("URL: " + document.URL + "<br>");
        document.write("Window Height: " + window.innerHeight + "<br>");
        document.write("PI: " + Math.PI + "<br>");
        
        let str = "Hello World";
        document.write("String Length: " + str.length + ", Uppercase: " + str.toUpperCase());
    </script>
</body>
</html>
