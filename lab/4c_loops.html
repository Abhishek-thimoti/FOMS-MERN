<!DOCTYPE html>
<html>
<body>
    <script>
        document.write("For loop: ");
        for(let i=1; i<=10; i++) document.write(i + " ");
        
        document.write("<br>While loop: ");
        let j = 1;
        while(j <= 10) { document.write(j + " "); j++; }

        document.write("<br>Do-While loop: ");
        let k = 1;
        do { document.write(k + " "); k++; } while(k <= 10);
    </script>
</body>
</html>
